services:
  # Database MySQL
  db:
    image: mysql:8.0
    container_name: pkl_database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: monitoring_pkl
      MYSQL_USER: pkl_user
      MYSQL_PASSWORD: pkl123
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - pkl_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      timeout: 20s
      retries: 10

  # Backend Laravel
  backend:
    image: php:8.2-apache
    container_name: pkl_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
    networks:
      - pkl_network
    working_dir: /var/www/html
    environment:
      - APP_NAME=Monitoring PKL SMKN 1 Subang
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=monitoring_pkl
      - DB_USERNAME=pkl_user
      - DB_PASSWORD=pkl123
    # Hanya install extensions, tanpa composer/migration setiap start
    command:

  # Frontend Vue
  frontend:
    image: node:18-alpine
    container_name: pkl_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    networks:
      - pkl_network
    working_dir: /app
    environment:
      - VITE_API_URL=http://localhost:8000/api
    command: sh -c "
      npm install --legacy-peer-deps &&
      npm run dev -- --host 0.0.0.0
      "

networks:
  pkl_network:
    driver: bridge

volumes:
  db_data: